<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Countdown</title>
<style>
@font-face {
  font-family: "Modam Font";
  src: local("Modam Font"), local("Modam");
  font-display: swap;
}

:root {
  --panel: rgba(255, 255, 255, 0.94);
  --border: rgba(0, 0, 0, 0.08);
  --text-main: #1a1a2e;
  --text-muted: #6b7280;
  --primary: #ea580c;
  --primary-soft: #fff7ed;
  --tile-bg: rgba(255, 255, 255, 0.7);
  --danger: #dc2626;
  --shadow: 0 16px 48px rgba(0, 0, 0, 0.06);
}

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  min-height: 100vh;
  padding: 1rem;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text-main);
  font-family: "Modam Font", "Modam", "Inter", "Segoe UI", Tahoma, Arial, sans-serif;
  background: transparent;
}

html, body, body * {
  font-family: "Modam Font", "Modam", "Inter", "Segoe UI", Tahoma, Arial, sans-serif !important;
}

.panel {
  position: relative;
  width: min(880px, calc(100% - 2rem));
  padding: 1.5rem 1.5rem 1.35rem;
  border: 1px solid var(--border);
  border-radius: 20px;
  background: var(--panel);
  backdrop-filter: blur(12px);
  box-shadow: var(--shadow);
  animation: panelIn 0.5s ease-out;
}

@keyframes panelIn {
  from {
    opacity: 0;
    transform: translateY(12px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

.header {
  display: flex;
  align-items: center;
  gap: 0.85rem;
  margin-bottom: 1rem;
}

.logo-wrap {
  width: 56px;
  height: 56px;
  border-radius: 12px;
  background: transparent;
  display: grid;
  place-items: center;
  overflow: hidden;
  flex-shrink: 0;
}

#brandLogo {
  width: 100%;
  height: 100%;
  object-fit: contain;
  transform: scale(1.5);
  transform-origin: center center;
}

.logo-fallback {
  color: var(--text-muted);
  font-size: 0.7rem;
  display: none;
}

.brand-meta {
  display: flex;
  flex-direction: column;
  gap: 0.12rem;
}

.brand-meta .hero-title {
  font-size: 1.15rem;
  font-weight: 900;
  font-family: "modam", "Modam Font", "Modam", "Inter", "Segoe UI", Tahoma, Arial, sans-serif;
  color: var(--text-main);
  letter-spacing: 0.02em;
  display: flex;
  align-items: center;
  gap: 0.2rem;
}

.brand-meta .hero-title .dot-holder {
  display: inline-block;
  min-width: 1.2em;
  text-align: right;
  font-weight: 400;
  opacity: 0.9;
}

.brand-meta span.subtitle-label {
  display: block;
  font-size: 0.8rem;
  color: var(--text-muted);
}

.subtitle {
  margin: 0 0 1rem;
  color: var(--text-main);
  font-size: 1.05rem;
  font-weight: 700;
  letter-spacing: 0.02em;
  line-height: 1.45;
  text-shadow: 0 1px 2px rgba(0,0,0,0.06);
}

.alert {
  display: none;
  margin: 0 0 0.75rem;
  padding: 0.5rem 0.75rem;
  border: 1px solid #fecaca;
  border-radius: 10px;
  background: #fff5f5;
  color: var(--danger);
  font-size: 0.85rem;
}

.alert.show {
  display: block;
  animation: shake 0.4s ease;
}

@keyframes shake {
  0%, 100% { transform: translateX(0); }
  25% { transform: translateX(-4px); }
  75% { transform: translateX(4px); }
}

.countdown-wrap {
  position: relative;
  border-radius: 16px;
  padding: 2px;
  background: linear-gradient(90deg, #ea580c, #fb923c, #fdba74, #ea580c);
  background-size: 300% 100%;
  animation: borderFlow 4s ease-in-out infinite;
}

@keyframes borderFlow {
  0%, 100% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
}

.countdown {
  display: flex;
  flex-direction: row;
  direction: rtl;
  gap: 0.85rem;
  border-radius: 14px;
  background: var(--panel);
  padding: 1.15rem;
  justify-content: space-between;
}

.lock-unit {
  flex: 1 1 0;
  min-width: 120px;
  text-align: center;
}

.wheel-window {
  position: relative;
  height: clamp(3.6rem, 10vw, 5.2rem);
  overflow: hidden;
  border-radius: 14px;
  border: 1px solid rgba(255, 255, 255, 0.16);
  background: linear-gradient(180deg, #2a2e36 0%, #1a1d24 52%, #12151b 100%);
  box-shadow:
    inset 0 1px 0 rgba(255, 255, 255, 0.12),
    inset 0 -12px 18px rgba(0, 0, 0, 0.28),
    0 10px 30px rgba(0, 0, 0, 0.2);
}

.wheel-window::before {
  content: "";
  position: absolute;
  inset: 50% 0 auto;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.18), transparent);
  transform: translateY(-0.5px);
  z-index: 2;
}

.wheel-digit {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: clamp(2.1rem, 7vw, 3.9rem);
  font-weight: 900;
  line-height: 1;
  letter-spacing: 0.04em;
  font-variant-numeric: tabular-nums;
  color: #f8fafc;
  text-shadow: 0 2px 12px rgba(0, 0, 0, 0.45);
  will-change: transform;
  transition: transform 620ms cubic-bezier(0.22, 0.8, 0.28, 1);
}

.wheel-digit.next {
  transform: translateY(100%);
}

.wheel-window.is-animating .wheel-digit.current {
  transform: translateY(-100%);
}

.wheel-window.is-animating .wheel-digit.next {
  transform: translateY(0);
}

.label {
  margin-top: 0.55rem;
  font-size: 0.74rem;
  letter-spacing: 0.12em;
  color: var(--text-muted);
}

.actions {
  margin-top: 1.25rem;
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 0.65rem;
}

.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 0.5rem;
  text-decoration: none;
  border: none;
  background: linear-gradient(145deg, #fff 0%, #f8fafc 100%);
  color: var(--text-main);
  border-radius: 12px;
  padding: 0.7rem 1.1rem;
  font-size: 0.95rem;
  font-weight: 600;
  box-shadow: 0 2px 8px rgba(0,0,0,0.06), 0 1px 0 rgba(255,255,255,0.8) inset;
  transition: transform 0.2s ease, box-shadow 0.2s ease;
}

.btn:hover {
  transform: translateY(-3px);
  box-shadow: 0 8px 24px rgba(234, 88, 12, 0.18), 0 2px 0 rgba(255,255,255,0.9) inset;
}

.btn:active {
  transform: translateY(-1px);
}

.btn svg {
  width: 22px;
  height: 22px;
  flex-shrink: 0;
}

@media (max-width: 640px) {
  .panel {
    padding: 1.1rem;
  }
  .countdown {
    flex-wrap: wrap;
  }
  .lock-unit {
    flex: 1 1 calc(50% - 0.4rem);
    min-width: 0;
  }
  .actions {
    gap: 0.5rem;
  }
  .btn span { display: none; }
  .btn { padding: 0.75rem 1rem; }
  .btn svg { width: 26px; height: 26px; }
}
</style>
</head>
<body>

<script>
let target = new Date("2026-03-01T00:00:00Z").getTime();
const subtitleEl = document.getElementById("subtitle");
const errorMessageEl = document.getElementById("errorMessage");
const allowedTargets = new Set(["w1", "w2", "w3", "w4"]);

var urlParams = new URLSearchParams(window.location.search);
var fixedTime = urlParams.get("t");
if (fixedTime) {
  var parsed = Date.parse(fixedTime);
  if (!Number.isNaN(parsed)) {
    target = parsed;
    var d = new Date(target);
    subtitleEl.innerText = d.toLocaleDateString("fa-IR", {
      weekday: "long", year: "numeric", month: "long", day: "numeric",
      hour: "2-digit", minute: "2-digit"
    });
  }
}

let rawTargetParam = urlParams.get("target");

// Auto-detect: when embedded in eseminar.tv, use the parent page URL (e.g. panel/.../description)
if (!rawTargetParam && typeof document.referrer === "string" && document.referrer) {
  try {
    const ref = new URL(document.referrer);
    if (ref.hostname.endsWith("eseminar.tv")) {
      rawTargetParam = ref.origin + ref.pathname + ref.search;
    }
  } catch (_) {}
}

// Normalize panel/description URLs to the public webinar page URL for API
function normalizeWebinarUrl(url) {
  if (!url || !/^https?:\/\//i.test(url)) return url;
  try {
    const u = new URL(url);
    if (!u.hostname.endsWith("eseminar.tv")) return url;
    let path = u.pathname;
    path = path.replace(/\/panel\//g, "/");
    path = path.replace(/\/description.*$/, "");
    path = path.replace(/\/$/, "") || "/";
    return u.origin + path + u.search;
  } catch (_) {
    return url;
  }
}

if (rawTargetParam && /^https?:\/\//i.test(rawTargetParam)) {
  rawTargetParam = normalizeWebinarUrl(rawTargetParam);
}

const smartApi = new URLSearchParams(window.location.search).get("smartApi") || "/api/webinar-target";
const isWebinarUrl = rawTargetParam && /^https?:\/\//i.test(rawTargetParam);
const targetId = !isWebinarUrl && allowedTargets.has(rawTargetParam) ? rawTargetParam : "w1";
const targetJsonUrl = isWebinarUrl
  ? `${smartApi}?url=${encodeURIComponent(rawTargetParam)}`
  : `/targets/${targetId}.json`;

var JALALI_MONTHS = { "فروردین":1,"اردیبهشت":2,"خرداد":3,"تیر":4,"مرداد":5,"شهریور":6,"مهر":7,"آبان":8,"آذر":9,"دی":10,"بهمن":11,"اسفند":12 };
function jalaliToGregorian(jy, jm, jd) {
  jy -= 979; jm -= 1; jd -= 1;
  var jdn = 365*jy + Math.floor(jy/33)*8 + Math.floor((jy%33+3)/4) + (jm<6 ? jm*31 : 186+(jm-6)*30) + jd;
  var gdn = jdn + 79;
  var gy = 1600 + 400*Math.floor(gdn/146097);
  gdn %= 146097;
  var leap = true;
  if (gdn >= 36525) { gdn--; gy += 100*Math.floor(gdn/36524); gdn %= 36524; if (gdn >= 365) gdn++; else leap = false; }
  gy += 4*Math.floor(gdn/1461); gdn %= 1461;
  if (gdn >= 366) { leap = false; gdn--; gy += Math.floor(gdn/365); gdn %= 365; }
  var gd = gdn + 1;
  var days = [31, leap?29:28, 31,30,31,30,31,31,30,31,30,31];
  var gm = 0;
  while (gm < 12 && gd > days[gm]) { gd -= days[gm]; gm++; }
  return [gy, gm+1, gd];
}
function parseWebinarPageHtml(html, webinarUrl) {
  var text = html.replace(/<[^>]+>/g, " ").replace(/\s+/g, " ").replace(/&#?\w+;/g, "").trim();
  var fa = "\u06f0\u06f1\u06f2\u06f3\u06f4\u06f5\u06f6\u06f7\u06f8\u06f9", ar = "\u0660\u0661\u0662\u0663\u0664\u0665\u0666\u0667\u0668\u0669";
  for (var i = 0; i <= 9; i++) { text = text.split(fa[i]).join(i); text = text.split(ar[i]).join(i); }
  text = text.replace(/\u064a/g, "\u06cc").replace(/\u0643/g, "\u06a9");
  var m = text.match(/شروع\s+وبینار\s*(\d+)\s+(\S+)\s+(\d+)\s*-\s*ساعت\s*(\d{1,2}):(\d{2})/);
  if (!m) return null;
  var day = parseInt(m[1],10), monthName = m[2], year = parseInt(m[3],10), hour = parseInt(m[4],10), min = parseInt(m[5],10);
  var month = JALALI_MONTHS[monthName];
  if (!month) return null;
  var g = jalaliToGregorian(year, month, day);
  var iso = g[0]+"-"+String(g[1]).padStart(2,"0")+"-"+String(g[2]).padStart(2,"0")+"T"+String(hour).padStart(2,"0")+":"+String(min).padStart(2,"0")+":00+03:30";
  return { target_iso: iso, webinar_url: webinarUrl };
}

function pad(value) {
  return String(value).padStart(2, "0");
}

function createWheel(id) {
  const root = document.getElementById(id);
  return {
    root,
    current: root.querySelector(".wheel-digit.current"),
    next: root.querySelector(".wheel-digit.next"),
    value: "00",
    timer: null
  };
}

const wheels = {
  days: createWheel("daysWheel"),
  hours: createWheel("hoursWheel"),
  minutes: createWheel("minutesWheel"),
  seconds: createWheel("secondsWheel")
};

function setWheelValue(wheel, nextValue, instant) {
  if (wheel.value === nextValue) return;
  if (wheel.timer) {
    clearTimeout(wheel.timer);
    wheel.timer = null;
  }
  if (instant) {
    wheel.root.classList.remove("is-animating");
    wheel.current.textContent = nextValue;
    wheel.next.textContent = nextValue;
    wheel.value = nextValue;
    return;
  }
  wheel.next.textContent = nextValue;
  wheel.root.classList.add("is-animating");
  wheel.timer = setTimeout(() => {
    wheel.root.classList.remove("is-animating");
    wheel.current.textContent = nextValue;
    wheel.next.textContent = nextValue;
    wheel.value = nextValue;
    wheel.timer = null;
  }, 640);
}

function renderCountdown(instant) {
  const now = Date.now();
  const diff = Math.max(0, target - now);
  const d = Math.floor(diff / (1000 * 60 * 60 * 24));
  const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
  const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
  const s = Math.floor((diff % (1000 * 60)) / 1000);

  setWheelValue(wheels.days, pad(d), instant);
  setWheelValue(wheels.hours, pad(h), instant);
  setWheelValue(wheels.minutes, pad(m), instant);
  setWheelValue(wheels.seconds, pad(s), instant);
}

function renderTargetDate(ms) {
  const d = new Date(ms);
  subtitleEl.innerText = d.toLocaleDateString("fa-IR", {
    weekday: "long",
    year: "numeric",
    month: "long",
    day: "numeric",
    hour: "2-digit",
    minute: "2-digit"
  });
}

async function refreshTarget() {
  errorMessageEl.classList.remove("show");
  if (fixedTime && !Number.isNaN(Date.parse(fixedTime))) {
    renderTargetDate(target);
    return;
  }
  if (isWebinarUrl) {
    try {
      const res = await fetch(targetJsonUrl + "?t=" + Date.now(), { cache: "no-store" });
      if (res.ok) {
        const data = await res.json();
        const next = Date.parse(data.target_iso);
        if (!Number.isNaN(next)) { target = next; renderTargetDate(target); return; }
      }
    } catch (_) {}
    try {
      var proxy = "https://api.allorigins.win/raw?url=" + encodeURIComponent(rawTargetParam);
      const r = await fetch(proxy, { cache: "no-store" });
      var html = await r.text();
      var data = parseWebinarPageHtml(html, rawTargetParam);
      if (data && data.target_iso) {
        var next = Date.parse(data.target_iso);
        if (!Number.isNaN(next)) { target = next; renderTargetDate(target); return; }
      }
    } catch (_) {}
  } else {
    try {
      const res = await fetch(targetJsonUrl + "?t=" + Date.now(), { cache: "no-store" });
      if (!res.ok) throw new Error("HTTP " + res.status);
      const data = await res.json();
      const next = Date.parse(data.target_iso);
      if (Number.isNaN(next)) throw new Error("Invalid target_iso");
      target = next;
      renderTargetDate(target);
    } catch (err) {
      errorMessageEl.classList.add("show");
      renderTargetDate(target);
    }
    return;
  }
  renderTargetDate(target);
}

renderCountdown(true);
setInterval(() => renderCountdown(false), 1000);

refreshTarget();
setInterval(refreshTarget, 5 * 60 * 1000);

(function () {
  const el = document.getElementById("titleDots");
  if (!el) return;
  const steps = [".", "..", "..."];
  let i = 0;
  setInterval(function () {
    i = (i + 1) % steps.length;
    el.textContent = steps[i];
  }, 500);
})();

const logoEl = document.getElementById("brandLogo");
const logoFallbackEl = document.getElementById("logoFallback");
if (logoEl.complete && logoEl.naturalWidth > 0) {
  logoFallbackEl.style.display = "none";
} else {
  logoEl.addEventListener("load", () => { logoFallbackEl.style.display = "none"; });
  logoEl.addEventListener("error", () => {
    logoEl.style.display = "none";
    logoFallbackEl.style.display = "inline";
  });
}

const params = new URLSearchParams(window.location.search);
document.getElementById("btnInstagram").href = params.get("ig") || "https://www.instagram.com/tiheac/?hl=en";
document.getElementById("btnWebsite").href = params.get("site") || "https://tihe.ac.ir/";
document.getElementById("btnTelegram").href = params.get("tg") || "https://t.me/tiheac";
document.getElementById("btnLinkedIn").href = params.get("li") || "https://ir.linkedin.com/in/tiheac";
</script>
