<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Countdown</title>
<style>
:root {
  --bg-top: #fff7ed;
  --bg-bottom: #ffedd5;
  --card-bg: rgba(255, 255, 255, 0.92);
  --tile-bg: rgba(249, 115, 22, 0.12);
  --text-main: #7c2d12;
  --text-muted: #9a3412;
  --accent: #f97316;
  --shadow: 0 24px 50px rgba(249, 115, 22, 0.2);
}

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  min-height: 100vh;
  display: grid;
  place-items: center;
  color: var(--text-main);
  font-family: "Inter", "Segoe UI", Arial, sans-serif;
  background:
    radial-gradient(circle at 10% 20%, rgba(251, 146, 60, 0.25), transparent 40%),
    radial-gradient(circle at 85% 80%, rgba(255, 214, 170, 0.38), transparent 35%),
    linear-gradient(145deg, var(--bg-top), var(--bg-bottom));
}

.panel {
  width: min(920px, calc(100% - 2rem));
  padding: 2.1rem;
  border: 1px solid rgba(249, 115, 22, 0.28);
  border-radius: 24px;
  background: var(--card-bg);
  backdrop-filter: blur(10px);
  box-shadow: var(--shadow);
}

h1 {
  margin: 0;
  font-size: clamp(1.3rem, 2.5vw, 2rem);
  font-weight: 700;
  letter-spacing: 0.02em;
}

.subtitle {
  margin: 0.45rem 0 1.5rem;
  color: var(--text-muted);
  font-size: 0.96rem;
}

.countdown {
  display: grid;
  grid-template-columns: repeat(4, minmax(100px, 1fr));
  gap: 0.9rem;
}

.box {
  background: linear-gradient(160deg, var(--tile-bg), rgba(255, 255, 255, 0.03));
  border: 1px solid rgba(249, 115, 22, 0.24);
  border-radius: 16px;
  padding: 1.15rem 0.8rem;
  text-align: center;
  transition: transform 180ms ease, border-color 180ms ease;
}

.box:hover {
  transform: translateY(-2px);
  border-color: rgba(249, 115, 22, 0.58);
}

.value {
  font-size: clamp(1.8rem, 5vw, 3rem);
  font-weight: 700;
  line-height: 1;
  font-variant-numeric: tabular-nums;
}

.label {
  margin-top: 0.45rem;
  font-size: 0.73rem;
  text-transform: uppercase;
  letter-spacing: 0.11em;
  color: var(--text-muted);
}

.live {
  display: none;
  margin-top: 1.1rem;
  color: var(--accent);
  font-weight: 600;
  letter-spacing: 0.05em;
}

.live.show {
  display: block;
}

@media (max-width: 640px) {
  .panel {
    padding: 1.35rem;
  }

  .countdown {
    grid-template-columns: repeat(2, minmax(100px, 1fr));
  }
}
</style>
</head>
<body>
<main class="panel">
  <h1 id="title">Webinar Countdown</h1>
  <p class="subtitle" id="subtitle">Waiting for webinar schedule...</p>

  <div class="countdown">
    <div class="box">
      <div class="value" id="days">00</div>
      <div class="label">Days</div>
    </div>
    <div class="box">
      <div class="value" id="hours">00</div>
      <div class="label">Hours</div>
    </div>
    <div class="box">
      <div class="value" id="minutes">00</div>
      <div class="label">Minutes</div>
    </div>
    <div class="box">
      <div class="value" id="seconds">00</div>
      <div class="label">Seconds</div>
    </div>
  </div>

  <p class="live" id="liveMessage">We're live now.</p>
  <p class="subtitle" id="syncInfo">Sync source: local fallback</p>
</main>

<script>
let target = new Date("2026-03-01T00:00:00Z").getTime();
const liveMessage = document.getElementById("liveMessage");
const titleEl = document.getElementById("title");
const subtitleEl = document.getElementById("subtitle");
const syncInfoEl = document.getElementById("syncInfo");
const allowedTargets = new Set(["w1", "w2", "w3", "w4"]);
const rawTargetParam = new URLSearchParams(window.location.search).get("target");

const isWebinarUrl = rawTargetParam && /^https?:\/\//i.test(rawTargetParam);
const targetId = !isWebinarUrl && allowedTargets.has(rawTargetParam) ? rawTargetParam : "w1";
const targetJsonUrl = isWebinarUrl
  ? `/api/webinar-target?url=${encodeURIComponent(rawTargetParam)}`
  : `/targets/${targetId}.json`;

function pad(value) {
  return String(value).padStart(2, "0");
}

function renderTargetDate(ms) {
  const d = new Date(ms);
  subtitleEl.innerText = d.toLocaleString();
}

async function refreshTarget() {
  try {
    const res = await fetch(targetJsonUrl + "?t=" + Date.now(), { cache: "no-store" });
    if (!res.ok) {
      throw new Error("HTTP " + res.status);
    }

    const data = await res.json();
    const next = Date.parse(data.target_iso);
    if (Number.isNaN(next)) {
      throw new Error("Invalid target_iso");
    }

    target = next;
    liveMessage.classList.remove("show");
    titleEl.innerText = data.title || "Webinar Countdown";
    renderTargetDate(target);
    if (isWebinarUrl) {
      syncInfoEl.innerText = "Mode: live URL | Synced from " + (data.webinar_url || rawTargetParam);
    } else {
      syncInfoEl.innerText = `Target: ${targetId} | Synced from ` + (data.webinar_url || "remote source");
    }
  } catch (err) {
    renderTargetDate(target);
    if (isWebinarUrl) {
      syncInfoEl.innerText = "Mode: live URL | Sync failed, using fallback target";
    } else {
      syncInfoEl.innerText = `Target: ${targetId} | Sync failed, using fallback target`;
    }
  }
}

setInterval(() => {
  const now = new Date().getTime();
  let diff = target - now;

  if (diff <= 0) {
    diff = 0;
    liveMessage.classList.add("show");
  }

  const d = Math.floor(diff / (1000 * 60 * 60 * 24));
  const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
  const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
  const s = Math.floor((diff % (1000 * 60)) / 1000);

  document.getElementById("days").innerText = pad(d);
  document.getElementById("hours").innerText = pad(h);
  document.getElementById("minutes").innerText = pad(m);
  document.getElementById("seconds").innerText = pad(s);
}, 1000);

refreshTarget();
setInterval(refreshTarget, 5 * 60 * 1000);
</script>

</body>
</html>
