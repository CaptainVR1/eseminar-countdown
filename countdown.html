<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Countdown</title>
<style>
@font-face {
  font-family: "Modam Font";
  src: local("Modam Font"), local("Modam");
  font-display: swap;
}

:root {
  --panel: rgba(255, 255, 255, 0.94);
  --border: rgba(0, 0, 0, 0.08);
  --text-main: #1a1a2e;
  --text-muted: #6b7280;
  --primary: #ea580c;
  --primary-soft: #fff7ed;
  --tile-bg: rgba(255, 255, 255, 0.7);
  --danger: #dc2626;
  --shadow: 0 16px 48px rgba(0, 0, 0, 0.06);
}

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  min-height: 100vh;
  padding: 1rem;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text-main);
  font-family: "Modam Font", "Modam", "Inter", "Segoe UI", Tahoma, Arial, sans-serif;
  background: transparent;
}

html, body, body * {
  font-family: "Modam Font", "Modam", "Inter", "Segoe UI", Tahoma, Arial, sans-serif !important;
}

.panel {
  position: relative;
  width: min(880px, calc(100% - 2rem));
  padding: 1.5rem 1.5rem 1.35rem;
  border: 1px solid var(--border);
  border-radius: 20px;
  background: var(--panel);
  backdrop-filter: blur(12px);
  box-shadow: var(--shadow);
  animation: panelIn 0.5s ease-out;
}

@keyframes panelIn {
  from {
    opacity: 0;
    transform: translateY(12px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

.header {
  display: flex;
  align-items: center;
  gap: 0.85rem;
  margin-bottom: 1rem;
}

.logo-wrap {
  width: 56px;
  height: 56px;
  border-radius: 12px;
  background: transparent;
  display: grid;
  place-items: center;
  overflow: hidden;
  flex-shrink: 0;
}

#brandLogo {
  width: 100%;
  height: 100%;
  object-fit: contain;
  transform: scale(1.5);
  transform-origin: center center;
}

.logo-fallback {
  color: var(--text-muted);
  font-size: 0.7rem;
  display: none;
}

.brand-meta {
  display: flex;
  flex-direction: column;
  gap: 0.12rem;
}

.brand-meta .hero-title {
  font-size: 1.15rem;
  font-weight: 900;
  font-family: "modam", "Modam Font", "Modam", "Inter", "Segoe UI", Tahoma, Arial, sans-serif;
  color: var(--text-main);
  letter-spacing: 0.02em;
  display: flex;
  align-items: center;
  gap: 0.2rem;
  flex-wrap: wrap;
}

.brand-meta .hero-title .dot-holder {
  display: inline-block;
  min-width: 1.6em;
  text-align: right;
  font-weight: 400;
  opacity: 0.9;
}

.brand-meta .hero-title .title-tail {
  display: inline-flex;
  align-items: center;
  gap: 0.25rem;
  white-space: nowrap;
}

.brand-meta span.subtitle-label {
  display: block;
  font-size: 0.8rem;
  color: var(--text-muted);
}

.subtitle {
  margin: 0 0 1rem;
  color: var(--text-main);
  font-size: 1.05rem;
  font-weight: 700;
  letter-spacing: 0.02em;
  line-height: 1.45;
  text-shadow: 0 1px 2px rgba(0,0,0,0.06);
}

.alert {
  display: none;
  margin: 0 0 0.75rem;
  padding: 0.5rem 0.75rem;
  border: 1px solid #fecaca;
  border-radius: 10px;
  background: #fff5f5;
  color: var(--danger);
  font-size: 0.85rem;
}

.alert.show {
  display: block;
  animation: shake 0.4s ease;
}

@keyframes shake {
  0%, 100% { transform: translateX(0); }
  25% { transform: translateX(-4px); }
  75% { transform: translateX(4px); }
}

.countdown-wrap {
  position: relative;
  border-radius: 16px;
  padding: 2px;
  background: #ffffff;
}

.countdown {
  display: flex;
  flex-direction: row;
  direction: rtl;
  gap: 0.85rem;
  border-radius: 14px;
  background: #ffffff;
  padding: 1.15rem;
  justify-content: space-between;
}

.lock-unit {
  flex: 1 1 0;
  min-width: 120px;
  text-align: center;
}

.wheel-window {
  position: relative;
  height: clamp(3.6rem, 10vw, 5.2rem);
  overflow: hidden;
  border-radius: 14px;
  border: 1px solid rgba(15, 23, 42, 0.16);
  background: #ffffff;
  box-shadow:
    inset 0 1px 0 rgba(255, 255, 255, 0.9),
    inset 0 -10px 14px rgba(15, 23, 42, 0.08),
    0 8px 24px rgba(15, 23, 42, 0.08);
}

.wheel-window::before {
  content: "";
  position: absolute;
  inset: 50% 0 auto;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(15, 23, 42, 0.22), transparent);
  transform: translateY(-0.5px);
  z-index: 2;
}

.wheel-digit {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: clamp(2.1rem, 7vw, 3.9rem);
  /* Only the countdown numbers use Dubai (fallbacks included). */
  font-family: "Dubai", "Dubai Medium", "Dubai Regular", "Modam Font", "Modam", "Inter", "Segoe UI", Tahoma, Arial, sans-serif !important;
  font-weight: 400;
  line-height: 1;
  letter-spacing: 0.04em;
  font-variant-numeric: tabular-nums;
  color: #111827;
  text-shadow: none;
  will-change: transform;
  transition: transform 620ms cubic-bezier(0.22, 0.8, 0.28, 1);
}

.wheel-window.no-transition .wheel-digit {
  transition: none !important;
}

.wheel-digit.next {
  transform: translateY(100%);
}

.wheel-window.is-animating .wheel-digit.current {
  transform: translateY(-100%);
}

.wheel-window.is-animating .wheel-digit.next {
  transform: translateY(0);
}

.label {
  margin-top: 0.55rem;
  font-size: 0.74rem;
  letter-spacing: 0.12em;
  color: var(--text-muted);
}

.actions {
  margin-top: 1.25rem;
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 0.65rem;
}

.desc-section {
  margin-top: 1.2rem;
  padding: 0.95rem 1rem;
  border: 1px solid rgba(15, 23, 42, 0.1);
  border-radius: 16px;
  background: rgba(255, 255, 255, 0.55);
}

.desc-title {
  margin: 0 0 0.45rem;
  font-size: 0.92rem;
  font-weight: 400;
  color: var(--text-main);
  letter-spacing: 0.02em;
}

.desc-body {
  margin: 0;
  color: var(--text-muted);
  font-size: 0.92rem;
  line-height: 1.65;
  white-space: pre-wrap;
}

.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 0.5rem;
  text-decoration: none;
  border: none;
  background: linear-gradient(145deg, #fff 0%, #f8fafc 100%);
  color: var(--text-main);
  border-radius: 12px;
  padding: 0.7rem 1.1rem;
  font-size: 0.95rem;
  font-weight: 600;
  box-shadow: 0 2px 8px rgba(0,0,0,0.06), 0 1px 0 rgba(255,255,255,0.8) inset;
  transition: transform 0.2s ease, box-shadow 0.2s ease;
}

.btn:hover {
  transform: translateY(-3px);
  box-shadow: 0 8px 24px rgba(234, 88, 12, 0.18), 0 2px 0 rgba(255,255,255,0.9) inset;
}

.btn:active {
  transform: translateY(-1px);
}

.btn svg {
  width: 22px;
  height: 22px;
  flex-shrink: 0;
}

@media (max-width: 640px) {
  .panel {
    padding: 1.1rem;
  }
  .countdown {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: clamp(0.55rem, 2.5vw, 0.85rem);
    justify-content: initial;
    padding: clamp(0.75rem, 3vw, 1rem);
  }
  .lock-unit {
    flex: initial;
    width: 100%;
    min-width: 0;
  }
  .actions {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: clamp(0.5rem, 2.4vw, 0.75rem);
    margin-top: 1rem;
  }
  .btn span { display: none; }
  .btn {
    width: 100%;
    min-height: 50px;
    padding: 0.65rem;
    border-radius: 14px;
  }
  .btn svg { width: 22px; height: 22px; }
}
</style>
</head>
<body>

<script>
let target = new Date("2026-03-01T00:00:00Z").getTime();
const subtitleEl = document.getElementById("subtitle");
const errorMessageEl = document.getElementById("errorMessage");
const descSectionEl = document.getElementById("descSection");
const descEl = document.getElementById("webinarDesc");
const allowedTargets = new Set(["w1", "w2", "w3", "w4"]);

var urlParams = new URLSearchParams(window.location.search);
var fixedTime = urlParams.get("t");
var fixedDesc64 = urlParams.get("desc64") || urlParams.get("d64");
var fixedDesc = urlParams.get("desc") || urlParams.get("d");
if (fixedTime) {
  var parsed = Date.parse(fixedTime);
  if (!Number.isNaN(parsed)) {
    target = parsed;
    var d = new Date(target);
    subtitleEl.innerText = d.toLocaleDateString("fa-IR", {
      weekday: "long", year: "numeric", month: "long", day: "numeric",
      hour: "2-digit", minute: "2-digit"
    });
  }
}

function decodeBase64UrlToText(b64url) {
  try {
    b64url = (b64url || "").toString().trim();
    if (!b64url) return "";
    let b64 = b64url.replace(/-/g, "+").replace(/_/g, "/");
    while (b64.length % 4) b64 += "=";
    const bin = atob(b64);
    const bytes = new Uint8Array(bin.length);
    for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
    if (typeof TextDecoder !== "undefined") {
      return new TextDecoder("utf-8").decode(bytes);
    }
    // Fallback (older browsers)
    let s = "";
    for (let i = 0; i < bytes.length; i++) s += String.fromCharCode(bytes[i]);
    return decodeURIComponent(escape(s));
  } catch (_) {
    return "";
  }
}

function setDescriptionText(value) {
  if (!descSectionEl || !descEl) return;
  value = (value || "").toString().trim();
  if (!value) return;
  descSectionEl.style.display = "block";
  startFastTyping(descEl, value);
}

function startFastTyping(targetEl, text) {
  const reduceMotion = typeof window !== "undefined"
    && window.matchMedia
    && window.matchMedia("(prefers-reduced-motion: reduce)").matches;
  if (reduceMotion) {
    targetEl.textContent = text;
    return;
  }

  // Very fast typing, no typos. Always finishes within ~4 seconds.
  targetEl.textContent = "";
  const durationMs = 4000;
  const startedAt = performance.now();
  const n = text.length;

  function step(now) {
    const t = Math.min(1, (now - startedAt) / durationMs);
    const idx = Math.max(1, Math.floor(n * t));
    targetEl.textContent = text.slice(0, idx);
    if (t < 1) requestAnimationFrame(step);
  }

  requestAnimationFrame(step);
}

// If Telegram bot provided a description in the URL, show it immediately.
if (fixedDesc64) {
  setDescriptionText(decodeBase64UrlToText(fixedDesc64));
} else if (fixedDesc) {
  // URLSearchParams already decodes percent-encoding; decodeURIComponent is best-effort.
  try { fixedDesc = decodeURIComponent(fixedDesc); } catch (_) {}
  setDescriptionText(fixedDesc);
}

let rawTargetParam = urlParams.get("target");

// Auto-detect: when embedded in eseminar.tv, use the parent page URL (e.g. panel/.../description)
if (!rawTargetParam && typeof document.referrer === "string" && document.referrer) {
  try {
    const ref = new URL(document.referrer);
    if (ref.hostname.endsWith("eseminar.tv")) {
      rawTargetParam = ref.origin + ref.pathname + ref.search;
    }
  } catch (_) {}
}

// Normalize panel/description URLs to the public webinar page URL for API
function normalizeWebinarUrl(url) {
  if (!url || !/^https?:\/\//i.test(url)) return url;
  try {
    const u = new URL(url);
    if (!u.hostname.endsWith("eseminar.tv")) return url;
    let path = u.pathname;
    path = path.replace(/\/panel\//g, "/");
    path = path.replace(/\/description.*$/, "");
    path = path.replace(/\/$/, "") || "/";
    return u.origin + path + u.search;
  } catch (_) {
    return url;
  }
}

if (rawTargetParam && /^https?:\/\//i.test(rawTargetParam)) {
  rawTargetParam = normalizeWebinarUrl(rawTargetParam);
}

const smartApi = new URLSearchParams(window.location.search).get("smartApi") || "/api/webinar-target";
const isWebinarUrl = rawTargetParam && /^https?:\/\//i.test(rawTargetParam);
const targetId = !isWebinarUrl && allowedTargets.has(rawTargetParam) ? rawTargetParam : "w1";
const targetJsonUrl = isWebinarUrl
  ? `${smartApi}?url=${encodeURIComponent(rawTargetParam)}`
  : `/targets/${targetId}.json`;

var JALALI_MONTHS = { "فروردین":1,"اردیبهشت":2,"خرداد":3,"تیر":4,"مرداد":5,"شهریور":6,"مهر":7,"آبان":8,"آذر":9,"دی":10,"بهمن":11,"اسفند":12 };
function jalaliToGregorian(jy, jm, jd) {
  jy -= 979; jm -= 1; jd -= 1;
  var jdn = 365*jy + Math.floor(jy/33)*8 + Math.floor((jy%33+3)/4) + (jm<6 ? jm*31 : 186+(jm-6)*30) + jd;
  var gdn = jdn + 79;
  var gy = 1600 + 400*Math.floor(gdn/146097);
  gdn %= 146097;
  var leap = true;
  if (gdn >= 36525) { gdn--; gy += 100*Math.floor(gdn/36524); gdn %= 36524; if (gdn >= 365) gdn++; else leap = false; }
  gy += 4*Math.floor(gdn/1461); gdn %= 1461;
  if (gdn >= 366) { leap = false; gdn--; gy += Math.floor(gdn/365); gdn %= 365; }
  var gd = gdn + 1;
  var days = [31, leap?29:28, 31,30,31,30,31,31,30,31,30,31];
  var gm = 0;
  while (gm < 12 && gd > days[gm]) { gd -= days[gm]; gm++; }
  return [gy, gm+1, gd];
}
function parseWebinarPageHtml(html, webinarUrl) {
  var text = html.replace(/<[^>]+>/g, " ").replace(/\s+/g, " ").replace(/&#?\w+;/g, "").trim();
  var fa = "\u06f0\u06f1\u06f2\u06f3\u06f4\u06f5\u06f6\u06f7\u06f8\u06f9", ar = "\u0660\u0661\u0662\u0663\u0664\u0665\u0666\u0667\u0668\u0669";
  for (var i = 0; i <= 9; i++) { text = text.split(fa[i]).join(i); text = text.split(ar[i]).join(i); }
  text = text.replace(/\u064a/g, "\u06cc").replace(/\u0643/g, "\u06a9");
  var m = text.match(/شروع\s+وبینار\s*(\d+)\s+(\S+)\s+(\d+)\s*-\s*ساعت\s*(\d{1,2}):(\d{2})/);
  if (!m) return null;
  var day = parseInt(m[1],10), monthName = m[2], year = parseInt(m[3],10), hour = parseInt(m[4],10), min = parseInt(m[5],10);
  var month = JALALI_MONTHS[monthName];
  if (!month) return null;
  var g = jalaliToGregorian(year, month, day);
  var iso = g[0]+"-"+String(g[1]).padStart(2,"0")+"-"+String(g[2]).padStart(2,"0")+"T"+String(hour).padStart(2,"0")+":"+String(min).padStart(2,"0")+":00+03:30";
  return { target_iso: iso, webinar_url: webinarUrl };
}

function pad(value) {
  return String(value).padStart(2, "0");
}

function createWheel(id) {
  const root = document.getElementById(id);
  const current = root.querySelector(".wheel-digit.current");
  const next = root.querySelector(".wheel-digit.next");
  current.style.transform = "translateY(0%)";
  next.style.transform = "translateY(100%)";
  current.style.transition = "none";
  next.style.transition = "none";
  return {
    root,
    current,
    next,
    value: "00",
    timer: null,
    rafA: null,
    rafB: null
  };
}

const wheels = {
  days: createWheel("daysWheel"),
  hours: createWheel("hoursWheel"),
  minutes: createWheel("minutesWheel"),
  seconds: createWheel("secondsWheel")
};

function setWheelValue(wheel, nextValue, instant) {
  if (wheel.value === nextValue) return;
  const finishWheel = (finalValue) => {
    wheel.current.style.transition = "none";
    wheel.next.style.transition = "none";
    wheel.current.textContent = finalValue;
    wheel.next.textContent = finalValue;
    wheel.current.style.transform = "translateY(0%)";
    wheel.next.style.transform = "translateY(100%)";
    wheel.value = finalValue;
    if (wheel.timer) {
      clearTimeout(wheel.timer);
      wheel.timer = null;
    }
  };

  if (wheel.rafA) cancelAnimationFrame(wheel.rafA);
  if (wheel.rafB) cancelAnimationFrame(wheel.rafB);
  if (wheel.timer) finishWheel(wheel.next.textContent || wheel.value);

  if (instant) {
    finishWheel(nextValue);
    return;
  }

  wheel.current.style.transition = "none";
  wheel.next.style.transition = "none";
  wheel.current.textContent = wheel.value;
  wheel.next.textContent = nextValue;
  wheel.current.style.transform = "translateY(0%)";
  wheel.next.style.transform = "translateY(100%)";

  // Force browser to commit start position so animation is strictly upward.
  void wheel.root.offsetHeight;

  wheel.rafA = requestAnimationFrame(() => {
    wheel.rafB = requestAnimationFrame(() => {
      wheel.current.style.transition = "transform 620ms cubic-bezier(0.22, 0.8, 0.28, 1)";
      wheel.next.style.transition = "transform 620ms cubic-bezier(0.22, 0.8, 0.28, 1)";
      wheel.current.style.transform = "translateY(-100%)";
      wheel.next.style.transform = "translateY(0%)";

      const onDone = () => finishWheel(nextValue);
      wheel.next.addEventListener("transitionend", onDone, { once: true });
      wheel.timer = setTimeout(onDone, 700);
    });
  });
}

function renderCountdown(instant) {
  const now = Date.now();
  const diff = Math.max(0, target - now);
  const d = Math.floor(diff / (1000 * 60 * 60 * 24));
  const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
  const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
  const s = Math.floor((diff % (1000 * 60)) / 1000);

  setWheelValue(wheels.days, pad(d), instant);
  setWheelValue(wheels.hours, pad(h), instant);
  setWheelValue(wheels.minutes, pad(m), instant);
  setWheelValue(wheels.seconds, pad(s), instant);
}

function renderTargetDate(ms) {
  const d = new Date(ms);
  try {
    subtitleEl.innerText = d.toLocaleDateString("fa-IR", {
      weekday: "long",
      year: "numeric",
      month: "long",
      day: "numeric",
      hour: "2-digit",
      minute: "2-digit"
    });
  } catch (_) {
    // Never leave subtitle in a loading/empty state if locale formatting fails.
    subtitleEl.innerText = d.toISOString().replace("T", " ").slice(0, 16);
  }
}

async function refreshTarget() {
  errorMessageEl.classList.remove("show");
  if (fixedTime && !Number.isNaN(Date.parse(fixedTime))) {
    renderTargetDate(target);
    return;
  }
  if (isWebinarUrl) {
    try {
      const res = await fetch(targetJsonUrl + "?t=" + Date.now(), { cache: "no-store" });
      if (res.ok) {
        const data = await res.json();
        const next = Date.parse(data.target_iso);
        if (!Number.isNaN(next)) { target = next; renderTargetDate(target); return; }
      }
    } catch (_) {}
    try {
      var proxy = "https://api.allorigins.win/raw?url=" + encodeURIComponent(rawTargetParam);
      const r = await fetch(proxy, { cache: "no-store" });
      var html = await r.text();
      var data = parseWebinarPageHtml(html, rawTargetParam);
      if (data && data.target_iso) {
        var next = Date.parse(data.target_iso);
        if (!Number.isNaN(next)) { target = next; renderTargetDate(target); return; }
      }
    } catch (_) {}
  } else {
    try {
      const res = await fetch(targetJsonUrl + "?t=" + Date.now(), { cache: "no-store" });
      if (!res.ok) throw new Error("HTTP " + res.status);
      const data = await res.json();
      const next = Date.parse(data.target_iso);
      if (Number.isNaN(next)) throw new Error("Invalid target_iso");
      target = next;
      renderTargetDate(target);
    } catch (err) {
      errorMessageEl.classList.add("show");
      renderTargetDate(target);
    }
    return;
  }
  renderTargetDate(target);
}

renderCountdown(true);
setInterval(() => renderCountdown(false), 1000);

// Show a display value immediately; bot/API refresh can overwrite it.
renderTargetDate(target);
refreshTarget();
setInterval(refreshTarget, 5 * 60 * 1000);

(function () {
  const titlePrefixEl = document.getElementById("titlePrefix");
  const titleTailEl = document.getElementById("titleTail");
  const el = document.getElementById("titleDots");
  if (!el || !titlePrefixEl || !titleTailEl) return;

  const basePrefix = "در مسیر توسعه";
  const baseTail = "باشید";
  const base = basePrefix + " " + baseTail;
  const reduceMotion = typeof window !== "undefined"
    && window.matchMedia
    && window.matchMedia("(prefers-reduced-motion: reduce)").matches;

  function sleep(ms) {
    return new Promise((r) => setTimeout(r, ms));
  }

  function getNextTypoMode(key, modes) {
    let last = null;
    try { last = localStorage.getItem(key); } catch (_) {}
    const options = last ? modes.filter((m) => m !== last) : modes.slice();
    const next = options[Math.floor(Math.random() * options.length)];
    try { localStorage.setItem(key, next); } catch (_) {}
    return next;
  }

  async function typeChars(targetEl, text, delayMs) {
    for (const ch of text) {
      targetEl.textContent += ch;
      await sleep(delayMs);
    }
  }

  async function backspace(targetEl, count, delayMs) {
    for (let i = 0; i < count; i++) {
      targetEl.textContent = targetEl.textContent.slice(0, -1);
      await sleep(delayMs);
    }
  }

  async function typeTitleWhenSeen() {
    if (reduceMotion) {
      titlePrefixEl.textContent = basePrefix;
      titleTailEl.textContent = baseTail;
      el.textContent = " ...";
      return;
    }

    // Slower typing (requested) with one typo per load.
    // Add a few typos (still always corrected before the final phrase).
    // Typo modes rotate (stored in localStorage) so each refresh feels different.
    const charDelay = 340;
    const wordPause = 260;
    const fixPause = 340;
    const bsDelay = 140;

    // Start only when the panel is visible to the user.
    await waitUntilPanelVisible();
    // Give the first countdown render a moment to paint.
    await new Promise((r) => requestAnimationFrame(() => requestAnimationFrame(r)));

    titlePrefixEl.textContent = "";
    titleTailEl.textContent = "";
    // Avoid showing dots alone on the second line while tail is empty.
    el.style.visibility = "hidden";

    const prefixMode = getNextTypoMode("titleTypoModePrefix", ["wrong", "missing"]);
    const tailMode = getNextTypoMode("titleTypoModeTail", ["extra", "missing_y", "wrong_last"]);

    // Type prefix with a typo + fix in "توسعه".
    const typoWord = (prefixMode === "wrong") ? "توسغه" : "توسه";
    const fixWord = "توسعه";
    await typeChars(titlePrefixEl, "در مسیر ", charDelay);
    await sleep(wordPause);
    await typeChars(titlePrefixEl, typoWord, charDelay);
    await sleep(fixPause);
    await backspace(titlePrefixEl, typoWord.length, bsDelay);
    await typeChars(titlePrefixEl, fixWord, charDelay);

    // Now type tail with another typo + fix, while keeping dots glued to the tail.
    await sleep(wordPause);
    el.style.visibility = "visible";

    if (tailMode === "extra") {
      // Extra last letter: "باشیدی" -> backspace -> "باشید"
      await typeChars(titleTailEl, "باشیدی", charDelay);
      await sleep(fixPause);
      await backspace(titleTailEl, 1, bsDelay);
    } else if (tailMode === "missing_y") {
      // Missing "ی": "باشد" -> backspace -> "ید"
      await typeChars(titleTailEl, "باشد", charDelay);
      await sleep(fixPause);
      await backspace(titleTailEl, 1, bsDelay);
      await typeChars(titleTailEl, "ید", charDelay);
    } else {
      // Wrong last letter: "باشیذ" -> backspace -> "د"
      await typeChars(titleTailEl, "باشیذ", charDelay);
      await sleep(fixPause);
      await backspace(titleTailEl, 1, bsDelay);
      await typeChars(titleTailEl, "د", charDelay);
    }

    // Final safety: always end on the exact phrase.
    titlePrefixEl.textContent = basePrefix;
    titleTailEl.textContent = baseTail;
  }

  const steps = [" .", " ..", " ..."];
  let i = 0;
  const dotsTimer = setInterval(function () {
    i = (i + 1) % steps.length;
    el.textContent = steps[i];
  }, 500);

  function waitUntilPanelVisible() {
    // In an iframe this usually resolves immediately, but it avoids typing before paint.
    return new Promise((resolve) => {
      const panel = document.querySelector(".panel");
      if (!panel) return resolve();

      const done = () => {
        if (cleanup.called) return;
        cleanup.called = true;
        document.removeEventListener("visibilitychange", onVis);
        if (observer) observer.disconnect();
        resolve();
      };
      const cleanup = { called: false };

      function onVis() {
        if (document.visibilityState === "visible") {
          // Don't resolve solely on visibility; wait for intersection too if possible.
          if (!("IntersectionObserver" in window)) done();
        }
      }

      let observer = null;
      if ("IntersectionObserver" in window) {
        observer = new IntersectionObserver((entries) => {
          const entry = entries && entries[0];
          if (!entry) return;
          if (document.visibilityState === "visible" && entry.isIntersecting && entry.intersectionRatio >= 0.4) {
            done();
          }
        }, { threshold: [0, 0.25, 0.4, 0.75, 1] });
        observer.observe(panel);
      }

      // Fast path.
      if (document.visibilityState === "visible") {
        if (!observer) return done();
      }
      document.addEventListener("visibilitychange", onVis);

      // Safety: never wait forever.
      setTimeout(done, 2500);
    });
  }

  typeTitleWhenSeen().catch(function () {
    // Never block the rest of the page if the animation fails.
    titlePrefixEl.textContent = basePrefix;
    titleTailEl.textContent = baseTail;
    el.style.visibility = "visible";
  });

  // Ensure the dots timer doesn't run for reduced-motion users.
  if (reduceMotion) {
    clearInterval(dotsTimer);
  }
})();
