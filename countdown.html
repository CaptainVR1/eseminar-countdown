<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Countdown</title>
<style>
:root {
  --panel: rgba(255, 255, 255, 0.94);
  --border: rgba(0, 0, 0, 0.08);
  --text-main: #1a1a2e;
  --text-muted: #6b7280;
  --primary: #ea580c;
  --primary-soft: #fff7ed;
  --tile-bg: rgba(255, 255, 255, 0.7);
  --danger: #dc2626;
  --shadow: 0 16px 48px rgba(0, 0, 0, 0.06);
}

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  min-height: 100vh;
  padding: 1rem;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text-main);
  font-family: "Inter", "Segoe UI", Tahoma, Arial, sans-serif;
  background: transparent;
}

.panel {
  position: relative;
  width: min(880px, calc(100% - 2rem));
  padding: 1.5rem 1.5rem 1.35rem;
  border: 1px solid var(--border);
  border-radius: 20px;
  background: var(--panel);
  backdrop-filter: blur(12px);
  box-shadow: var(--shadow);
  animation: panelIn 0.5s ease-out;
}

@keyframes panelIn {
  from {
    opacity: 0;
    transform: translateY(12px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

.header {
  display: flex;
  align-items: center;
  gap: 0.85rem;
  margin-bottom: 1rem;
}

.logo-wrap {
  width: 52px;
  height: 52px;
  border-radius: 12px;
  border: 1px solid var(--border);
  background: #fff;
  display: grid;
  place-items: center;
  overflow: hidden;
  flex-shrink: 0;
}

#brandLogo {
  width: 100%;
  height: 100%;
  object-fit: contain;
  transform: scale(1.3);
  transform-origin: center center;
}

.logo-fallback {
  color: var(--text-muted);
  font-size: 0.7rem;
  display: none;
}

.brand-meta {
  display: flex;
  flex-direction: column;
  gap: 0.12rem;
}

.brand-meta strong {
  font-size: 1rem;
}

.brand-meta span {
  font-size: 0.8rem;
  color: var(--text-muted);
}

.subtitle {
  margin: 0 0 1rem;
  color: var(--text-muted);
  font-size: 0.9rem;
}

.alert {
  display: none;
  margin: 0 0 0.75rem;
  padding: 0.5rem 0.75rem;
  border: 1px solid #fecaca;
  border-radius: 10px;
  background: #fff5f5;
  color: var(--danger);
  font-size: 0.85rem;
}

.alert.show {
  display: block;
  animation: shake 0.4s ease;
}

@keyframes shake {
  0%, 100% { transform: translateX(0); }
  25% { transform: translateX(-4px); }
  75% { transform: translateX(4px); }
}

.countdown-wrap {
  position: relative;
  border-radius: 16px;
  padding: 2px;
  background: linear-gradient(90deg, #ea580c, #fb923c, #fdba74, #ea580c);
  background-size: 300% 100%;
  animation: borderFlow 4s ease-in-out infinite;
}

@keyframes borderFlow {
  0%, 100% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
}

.countdown {
  display: grid;
  grid-template-columns: repeat(4, minmax(90px, 1fr));
  gap: 0.65rem;
  border-radius: 14px;
  background: var(--panel);
  padding: 1rem;
}

.box {
  background: var(--tile-bg);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 1rem 0.7rem;
  text-align: center;
  transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
}

.box:hover {
  transform: translateY(-2px);
  border-color: rgba(234, 88, 12, 0.3);
  box-shadow: 0 8px 24px rgba(234, 88, 12, 0.08);
}

.value {
  font-size: clamp(1.75rem, 4.5vw, 2.85rem);
  font-weight: 700;
  line-height: 1;
  font-variant-numeric: tabular-nums;
  transition: transform 0.15s ease;
}

.label {
  margin-top: 0.4rem;
  font-size: 0.7rem;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--text-muted);
}

.actions {
  margin-top: 1.1rem;
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 0.5rem;
}

.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 0.4rem;
  text-decoration: none;
  border: 1px solid var(--border);
  background: #fff;
  color: var(--text-main);
  border-radius: 10px;
  padding: 0.5rem 0.85rem;
  font-size: 0.82rem;
  font-weight: 600;
  transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
}

.btn:hover {
  transform: translateY(-2px);
  border-color: rgba(234, 88, 12, 0.4);
  box-shadow: 0 6px 16px rgba(234, 88, 12, 0.12);
}

.btn svg {
  width: 18px;
  height: 18px;
  flex-shrink: 0;
}

@media (max-width: 640px) {
  .panel {
    padding: 1.1rem;
  }
  .countdown {
    grid-template-columns: repeat(2, minmax(90px, 1fr));
  }
  .actions {
    gap: 0.4rem;
  }
  .btn span { display: none; }
  .btn { padding: 0.55rem; }
  .btn svg { width: 22px; height: 22px; }
}
</style>
</head>
<body>
<main class="panel">
  <div class="header">
    <div class="logo-wrap">
      <img id="brandLogo" src="logo.png" alt="Logo">
      <span class="logo-fallback" id="logoFallback">LOGO</span>
    </div>
    <div class="brand-meta">
      <strong>Eseminar Countdown</strong>
      <span>زمان تا شروع وبینار</span>
    </div>
  </div>
  <p class="subtitle" id="subtitle">در حال بارگذاری...</p>
  <p class="alert" id="errorMessage">امکان خواندن این صفحه وبینار وجود ندارد.</p>

  <div class="countdown-wrap">
  <div class="countdown">
    <div class="box">
      <div class="value" id="days">00</div>
      <div class="label">روز</div>
    </div>
    <div class="box">
      <div class="value" id="hours">00</div>
      <div class="label">ساعت</div>
    </div>
    <div class="box">
      <div class="value" id="minutes">00</div>
      <div class="label">دقیقه</div>
    </div>
    <div class="box">
      <div class="value" id="seconds">00</div>
      <div class="label">ثانیه</div>
    </div>
  </div>
  </div>

  <div class="actions">
    <a class="btn" id="btnInstagram" href="#" target="_blank" rel="noopener noreferrer" aria-label="Instagram">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.059 1.281-.073 1.689-.073 4.948 0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.69-.073-4.949-.073zm0 5.838c-3.403 0-6.162 2.759-6.162 6.162s2.759 6.163 6.162 6.163 6.162-2.759 6.162-6.163c0-3.403-2.759-6.162-6.162-6.162zm0 10.162c-2.209 0-4-1.79-4-4 0-2.209 1.791-4 4-4s4 1.791 4 4c0 2.21-1.791 4-4 4zm6.406-11.845c-.796 0-1.441.645-1.441 1.44s.645 1.44 1.441 1.44c.795 0 1.439-.645 1.439-1.44s-.644-1.44-1.439-1.44z"/></svg>
      <span>Instagram</span>
    </a>
    <a class="btn" id="btnWebsite" href="#" target="_blank" rel="noopener noreferrer" aria-label="Website">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M2 12h20M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
      <span>Website</span>
    </a>
    <a class="btn" id="btnTelegram" href="#" target="_blank" rel="noopener noreferrer" aria-label="Telegram">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M11.944 0A12 12 0 0 0 0 12a12 12 0 0 0 12 12 12 12 0 0 0 12-12A12 12 0 0 0 12 0a12 12 0 0 0-.056 0zm4.962 7.224c.1-.002.321.023.465.14a.506.506 0 0 1 .171.325c.016.093.036.306.02.472-.18 1.898-.962 6.502-1.36 8.627-.168.9-.499 1.201-.82 1.23-.696.065-1.225-.46-1.9-.902-1.056-.693-1.653-1.124-2.678-1.8-1.185-.78-.417-1.21.258-1.91.177-.184 3.247-2.977 3.307-3.23.007-.032.014-.15-.056-.212s-.174-.041-.249-.024c-.106.024-1.793 1.14-5.061 3.345-.48.33-.913.49-1.302.48-.428-.008-1.252-.241-1.865-.44-.752-.245-1.349-.374-1.297-.789.027-.216.325-.437.893-.663 3.498-1.524 5.83-2.529 6.998-3.014 3.332-1.386 4.025-1.627 4.476-1.635z"/></svg>
      <span>Telegram</span>
    </a>
    <a class="btn" id="btnLinkedIn" href="#" target="_blank" rel="noopener noreferrer" aria-label="LinkedIn">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433c-1.144 0-2.063-.926-2.063-2.065 0-1.138.92-2.063 2.063-2.063 1.14 0 2.064.925 2.064 2.063 0 1.139-.925 2.065-2.064 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>
      <span>LinkedIn</span>
    </a>
  </div>
</main>

<script>
let target = new Date("2026-03-01T00:00:00Z").getTime();
const subtitleEl = document.getElementById("subtitle");
const errorMessageEl = document.getElementById("errorMessage");
const allowedTargets = new Set(["w1", "w2", "w3", "w4"]);

let rawTargetParam = new URLSearchParams(window.location.search).get("target");

// Auto-detect: when embedded in eseminar.tv, use the parent page URL (e.g. panel/.../description)
if (!rawTargetParam && typeof document.referrer === "string" && document.referrer) {
  try {
    const ref = new URL(document.referrer);
    if (ref.hostname.endsWith("eseminar.tv")) {
      rawTargetParam = ref.origin + ref.pathname + ref.search;
    }
  } catch (_) {}
}

// Normalize panel/description URLs to the public webinar page URL for API
function normalizeWebinarUrl(url) {
  if (!url || !/^https?:\/\//i.test(url)) return url;
  try {
    const u = new URL(url);
    if (!u.hostname.endsWith("eseminar.tv")) return url;
    let path = u.pathname;
    path = path.replace(/\/panel\//g, "/");
    path = path.replace(/\/description.*$/, "");
    path = path.replace(/\/$/, "") || "/";
    return u.origin + path + u.search;
  } catch (_) {
    return url;
  }
}

if (rawTargetParam && /^https?:\/\//i.test(rawTargetParam)) {
  rawTargetParam = normalizeWebinarUrl(rawTargetParam);
}

const smartApi = new URLSearchParams(window.location.search).get("smartApi") || "/api/webinar-target";
const isWebinarUrl = rawTargetParam && /^https?:\/\//i.test(rawTargetParam);
const targetId = !isWebinarUrl && allowedTargets.has(rawTargetParam) ? rawTargetParam : "w1";
const targetJsonUrl = isWebinarUrl
  ? `${smartApi}?url=${encodeURIComponent(rawTargetParam)}`
  : `/targets/${targetId}.json`;

function pad(value) {
  return String(value).padStart(2, "0");
}

function renderTargetDate(ms) {
  const d = new Date(ms);
  subtitleEl.innerText = d.toLocaleDateString("fa-IR", {
    weekday: "long",
    year: "numeric",
    month: "long",
    day: "numeric",
    hour: "2-digit",
    minute: "2-digit"
  });
}

async function refreshTarget() {
  try {
    errorMessageEl.classList.remove("show");
    const res = await fetch(targetJsonUrl + "?t=" + Date.now(), { cache: "no-store" });
    if (!res.ok) throw new Error("HTTP " + res.status);

    const data = await res.json();
    const next = Date.parse(data.target_iso);
    if (Number.isNaN(next)) throw new Error("Invalid target_iso");

    target = next;
    renderTargetDate(target);
  } catch (err) {
    if (!isWebinarUrl) errorMessageEl.classList.add("show");
    renderTargetDate(target);
  }
}

setInterval(() => {
  const now = new Date().getTime();
  let diff = target - now;

  const d = Math.floor(diff / (1000 * 60 * 60 * 24));
  const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
  const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
  const s = Math.floor((diff % (1000 * 60)) / 1000);

  document.getElementById("days").innerText = pad(Math.max(0, d));
  document.getElementById("hours").innerText = pad(Math.max(0, h));
  document.getElementById("minutes").innerText = pad(Math.max(0, m));
  document.getElementById("seconds").innerText = pad(Math.max(0, s));
}, 1000);

refreshTarget();
setInterval(refreshTarget, 5 * 60 * 1000);

const logoEl = document.getElementById("brandLogo");
const logoFallbackEl = document.getElementById("logoFallback");
if (logoEl.complete && logoEl.naturalWidth > 0) {
  logoFallbackEl.style.display = "none";
} else {
  logoEl.addEventListener("load", () => { logoFallbackEl.style.display = "none"; });
  logoEl.addEventListener("error", () => {
    logoEl.style.display = "none";
    logoFallbackEl.style.display = "inline";
  });
}

const params = new URLSearchParams(window.location.search);
document.getElementById("btnInstagram").href = params.get("ig") || "https://instagram.com/";
document.getElementById("btnWebsite").href = params.get("site") || "https://eseminar.tv/";
document.getElementById("btnTelegram").href = params.get("tg") || "https://t.me/";
document.getElementById("btnLinkedIn").href = params.get("li") || "https://linkedin.com/";
</script>
</body>
</html>
