<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Countdown</title>
<style>
:root {
  --bg-top: #0f172a;
  --bg-bottom: #1e1b4b;
  --card-bg: rgba(15, 23, 42, 0.55);
  --tile-bg: rgba(255, 255, 255, 0.08);
  --text-main: #f8fafc;
  --text-muted: #cbd5e1;
  --accent: #22d3ee;
  --shadow: 0 24px 50px rgba(2, 6, 23, 0.45);
}

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  min-height: 100vh;
  display: grid;
  place-items: center;
  color: var(--text-main);
  font-family: "Inter", "Segoe UI", Arial, sans-serif;
  background:
    radial-gradient(circle at 10% 20%, rgba(34, 211, 238, 0.25), transparent 40%),
    radial-gradient(circle at 85% 80%, rgba(167, 139, 250, 0.25), transparent 35%),
    linear-gradient(145deg, var(--bg-top), var(--bg-bottom));
}

.panel {
  width: min(920px, calc(100% - 2rem));
  padding: 2.1rem;
  border: 1px solid rgba(255, 255, 255, 0.16);
  border-radius: 24px;
  background: var(--card-bg);
  backdrop-filter: blur(10px);
  box-shadow: var(--shadow);
}

h1 {
  margin: 0;
  font-size: clamp(1.3rem, 2.5vw, 2rem);
  font-weight: 700;
  letter-spacing: 0.02em;
}

.subtitle {
  margin: 0.45rem 0 1.5rem;
  color: var(--text-muted);
  font-size: 0.96rem;
}

.countdown {
  display: grid;
  grid-template-columns: repeat(4, minmax(100px, 1fr));
  gap: 0.9rem;
}

.box {
  background: linear-gradient(160deg, var(--tile-bg), rgba(255, 255, 255, 0.03));
  border: 1px solid rgba(255, 255, 255, 0.13);
  border-radius: 16px;
  padding: 1.15rem 0.8rem;
  text-align: center;
  transition: transform 180ms ease, border-color 180ms ease;
}

.box:hover {
  transform: translateY(-2px);
  border-color: rgba(34, 211, 238, 0.5);
}

.value {
  font-size: clamp(1.8rem, 5vw, 3rem);
  font-weight: 700;
  line-height: 1;
  font-variant-numeric: tabular-nums;
}

.label {
  margin-top: 0.45rem;
  font-size: 0.73rem;
  text-transform: uppercase;
  letter-spacing: 0.11em;
  color: var(--text-muted);
}

.live {
  display: none;
  margin-top: 1.1rem;
  color: var(--accent);
  font-weight: 600;
  letter-spacing: 0.05em;
}

.live.show {
  display: block;
}

@media (max-width: 640px) {
  .panel {
    padding: 1.35rem;
  }

  .countdown {
    grid-template-columns: repeat(2, minmax(100px, 1fr));
  }
}
</style>
</head>
<body>
<main class="panel">
  <h1>Countdown to Launch</h1>
  <p class="subtitle">March 1, 2026 at 12:00 AM</p>

  <div class="countdown">
    <div class="box">
      <div class="value" id="days">00</div>
      <div class="label">Days</div>
    </div>
    <div class="box">
      <div class="value" id="hours">00</div>
      <div class="label">Hours</div>
    </div>
    <div class="box">
      <div class="value" id="minutes">00</div>
      <div class="label">Minutes</div>
    </div>
    <div class="box">
      <div class="value" id="seconds">00</div>
      <div class="label">Seconds</div>
    </div>
  </div>

  <p class="live" id="liveMessage">We're live now.</p>
</main>

<script>
const target = new Date("2026-03-01T00:00:00").getTime();
const liveMessage = document.getElementById("liveMessage");

function pad(value) {
  return String(value).padStart(2, "0");
}

setInterval(() => {
  const now = new Date().getTime();
  let diff = target - now;

  if (diff <= 0) {
    diff = 0;
    liveMessage.classList.add("show");
  }

  const d = Math.floor(diff / (1000 * 60 * 60 * 24));
  const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
  const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
  const s = Math.floor((diff % (1000 * 60)) / 1000);

  document.getElementById("days").innerText = pad(d);
  document.getElementById("hours").innerText = pad(h);
  document.getElementById("minutes").innerText = pad(m);
  document.getElementById("seconds").innerText = pad(s);
}, 1000);
</script>

</body>
</html>
